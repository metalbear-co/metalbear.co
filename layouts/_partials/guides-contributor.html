{{- range (.GetTerms "contributors") }}
<div class="guides-contributor">
    <div class="guides-contributor__image">
        {{- with .Resources.GetMatch "profile.png" }}
        {{- with .Resize (printf "%dx webp" 56 ) }}
        <img src="{{ .RelPermalink }}" class="profile__image" alt="{{  .Title }}" width="{{ .Width }}"
            height="{{ .Height }}">
        {{- end }}
        {{- end }}
    </div>
    <header class="guides-contributor__header d-flex">
        <h3><a class="guides-contributor__name" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
        <div class="ms-3">
            {{- with .Params.twitter }}
            <a class="widget-contributor___social-link" href="{{ . }}" title="X (Twitter)" target="_blank" rel="noopener">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="#222222" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"/>
                </svg>
            </a>
            {{- end }}
            {{- with .Params.linkedin }}
            <a class="widget-contributor___social-link" href="{{ . }}" title="LinkedIn" target="_blank" rel="noopener">
                <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10.1831 0.676025C4.58238 0.676025 0.0422363 5.21617 0.0422363 10.8169C0.0422363 16.4176 4.58238 20.9577 10.1831 20.9577C15.7838 20.9577 20.3239 16.4176 20.3239 10.8169C20.3239 5.21617 15.7838 0.676025 10.1831 0.676025ZM7.70069 15.02H5.64717V8.41159H7.70069V15.02ZM6.66125 7.60032C6.01266 7.60032 5.59329 7.14081 5.59329 6.5725C5.59329 5.99257 6.02534 5.5468 6.68766 5.5468C7.34998 5.5468 7.75562 5.99257 7.76829 6.5725C7.76829 7.14081 7.34998 7.60032 6.66125 7.60032ZM15.2007 15.02H13.1472V11.3577C13.1472 10.5053 12.8493 9.92638 12.1067 9.92638C11.5394 9.92638 11.2024 10.3183 11.0535 10.6954C10.9986 10.8295 10.9848 11.0197 10.9848 11.2088V15.019H8.93027V10.519C8.93027 9.69398 8.90386 9.00419 8.87639 8.41053H10.6605L10.7546 9.32849H10.7958C11.0662 8.8975 11.7285 8.26159 12.8366 8.26159C14.1877 8.26159 15.2007 9.16687 15.2007 11.1126V15.02Z"
                        fill="#222222" />
                </svg>
            </a>
            {{- end }}
        </div>
    </header>
    <div class="widget-contributor__body">
        {{ .Content }}
    </div>
</div>
{{- end }}
